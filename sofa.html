<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FurnitureKart - Sofa Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        header { background-color: #2c3e50; color: white; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 28px; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: 500; }
        nav a:hover { color: #3498db; }
        .whatsapp-btn { background-color: #25D366; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        
        .main-section { padding: 40px 20px; background-color: #f5f6fa; }
        .main-section h2 { text-align: center; margin-bottom: 10px; color: #2c3e50; font-size: 32px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 40px; font-size: 16px; }
        
        /* Flipkart Style Product Grid */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        /* Product Card */
        .card { 
            background: #fff; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card:hover { 
            box-shadow: 0 8px 16px rgba(0,0,0,0.15); 
            transform: translateY(-5px); 
        }
        .card img { width: 100%; height: 200px; object-fit: cover; background-color: #eaeaea; }
        .card-content { padding: 15px; text-align: center; }
        .card-content h3 { font-size: 18px; color: #333; margin-bottom: 8px; }
        .price { color: #e74c3c; font-weight: bold; margin: 10px 0; font-size: 20px; }
        .buy-btn { display: block; background-color: #3498db; color: white; padding: 10px 0; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .buy-btn:hover { background-color: #2980b9; }
        
        footer { background-color: #2c3e50; color: white; text-align: center; padding: 30px 20px; margin-top: 50px; }
    </style>
</head>

        </nav>
        <a href="https://wa.me/916206366989" class="whatsapp-btn" target="_blank">💬 WhatsApp</a>
    </header>

    <section class="main-section">
        <h2>Hamare Banye Huye Premium Sofas</h2>
        <p class="subtitle">Niche scroll karein aur hamare behtareen sofa designs dekhein. Order ke liye button par click karein.</p>
